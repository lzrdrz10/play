<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Enlaces - Blog de Pelis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full card rounded-3xl shadow-2xl p-8 border border-white/10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-400 mb-2">🎥 Generador de Enlaces</h1>
            <p class="text-gray-400">Pega el enlace del video MP4 y genera tu enlace embebido listo para compartir</p>
        </div>

        <div class="space-y-6">
            <!-- Video URL -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">URL del Video MP4</label>
                <input id="videoUrl" type="text" 
                       class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl focus:outline-none focus:border-blue-500 text-white placeholder-gray-500"
                       placeholder="https://ejemplo.com/video.mp4">
            </div>

            <!-- Nombre de la película -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Nombre de la Película / Título</label>
                <input id="movieName" type="text" 
                       class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl focus:outline-none focus:border-blue-500 text-white placeholder-gray-500"
                       placeholder="Spider-Man: No Way Home">
            </div>

            <!-- URL de la imagen (poster) -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">URL de la Imagen (Poster) - Opcional</label>
                <input id="imageUrl" type="text" 
                       class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl focus:outline-none focus:border-blue-500 text-white placeholder-gray-500"
                       placeholder="https://ejemplo.com/poster.jpg">
            </div>
        </div>

        <button onclick="generarEnlace()" 
                class="mt-8 w-full bg-blue-600 hover:bg-blue-700 transition-all py-5 rounded-2xl text-xl font-bold flex items-center justify-center gap-3">
            🚀 GENERAR ENLACE DE REPRODUCCIÓN
        </button>

        <div id="resultado" class="hidden mt-6 p-6 bg-black/50 rounded-2xl border border-blue-500/30">
            <p class="text-sm text-gray-400 mb-2">Tu enlace embebido (copia y comparte):</p>
            <div class="flex gap-3">
                <input id="enlaceGenerado" readonly 
                       class="flex-1 bg-black/70 text-blue-300 font-mono text-sm p-4 rounded-2xl border border-white/10">
                <button onclick="copiarEnlace()" 
                        class="bg-blue-600 hover:bg-blue-700 px-6 rounded-2xl font-bold">
                    📋 Copiar
                </button>
            </div>
            <p class="text-xs text-green-400 mt-4 text-center">✅ Enlace listo para subir a tu GitHub Pages</p>
        </div>
    </div>

    <script>
        function encodeBase64(str) {
            if (!str) return '';
            return btoa(unescape(encodeURIComponent(str)));
        }

        function generarEnlace() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const movieName = document.getElementById('movieName').value.trim();
            const imageUrl = document.getElementById('imageUrl').value.trim();

            if (!videoUrl) {
                alert('❌ Debes pegar la URL del video MP4');
                return;
            }

            // Codificar todo en Base64 (método seguro UTF-8)
            const videoB64 = encodeBase64(videoUrl);
            const nameB64 = movieName ? encodeBase64(movieName) : '';
            const imageB64 = imageUrl ? encodeBase64(imageUrl) : '';

            // Construir la URL del reproductor (relativa al mismo repositorio)
            const baseURL = window.location.href.replace('index.html', '') + 'player.html';
            
            let enlace = `${baseURL}?videoUrl=${videoB64}`;
            if (nameB64) enlace += `&movieName=${nameB64}`;
            if (imageB64) enlace += `&imageUrl=${imageB64}`;

            document.getElementById('enlaceGenerado').value = enlace;
            document.getElementById('resultado').classList.remove('hidden');
            
            // Scroll suave al resultado
            document.getElementById('resultado').scrollIntoView({ behavior: 'smooth' });
        }

        function copiarEnlace() {
            const enlaceInput = document.getElementById('enlaceGenerado');
            enlaceInput.select();
            document.execCommand('copy');
            
            const originalText = event.target.innerHTML;
            event.target.innerHTML = '✅ Copiado!';
            setTimeout(() => {
                event.target.innerHTML = originalText;
            }, 2000);
        }

        // Atajo Enter en el primer campo
        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generarEnlace();
        });
    </script>
</body>
</html>
